<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background -->
  <rect width="100" height="100" fill="#0a0a0a"/>
  
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
  
  <!-- Inner circle -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
  
  <!-- Center dot -->
  <circle cx="50" cy="50" r="6" fill="#ffffff"/>
  
  <!-- Accent lines forming "A" for Aman -->
  <line x1="50" y1="20" x2="50" y2="45" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
  <line x1="35" y1="45" x2="65" y2="45" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
  <line x1="42" y1="35" x2="58" y2="35" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
</svg>
